<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | My Portfolio</title>
    
    <link rel="icon" type="image/png" href="materials/picture/favorite_icon/favicon2.png">
    
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 0; 
            background-color: #f8f9fa; 
            color: #333; 
        }

        /* --- CẤU HÌNH HEADER / NAV GOM VÀO GIỮA VÀ NỀN GIF ĐỘNG --- */
        nav { 
            /* 1. Thiết lập chuỗi màu loang chạy vô tận như GIF */
            background: linear-gradient(-45deg, #ff3333, #ffffff, #2b6cb0, #2f855a, #ff3333);
            background-size: 400% 400%;
            animation: gradientMove 12s linear infinite;
            
            /* 2. TĂNG PADDING: Giúp thanh Header to hơn, rộng rãi và cao cấp hơn */
            padding: 24px 0; 
            
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            display: flex;
            justify-content: center;
        }

        .nav-container {
            width: 100%;
            max-width: 840px;
            display: flex;
            
            /* 3. Gom cả Logo và cụm Menu xích lại sát nhau ở CHÍNH GIỮA HEADER */
            justify-content: center; 
            
            align-items: center;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            text-decoration: none;
            margin-right: 30px; /* Tăng khoảng cách nhẹ giữa logo và chữ cho thoáng */
        }

        .nav-logo img {
            /* Tăng kích thước logo lên một chút (từ 35px lên 42px) để cân xứng với header to */
            width: 42px !important;
            height: 42px !important;
            object-fit: contain;
            border-radius: 8px; 
        }

        .nav-links {
            display: flex;
        }

        .nav-links a { 
            color: #1a202c; 
            text-decoration: none; 
            margin-left: 20px; 
            margin-right: 15px;
            font-weight: bold; 
            font-size: 1.05rem; /* Tăng cỡ chữ menu lên một xíu cho dễ đọc */
            text-shadow: 0 1px 1px rgba(255,255,255,0.8);
            transition: color 0.2s ease;
        }

        .nav-links a:hover { 
            color: #dd6b20; 
        }

        /* Hiệu ứng dịch chuyển dải màu vô tận */
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* === CSS KHUNG NỘI DUNG BIỂU DIỄN === */
        .container { max-width: 800px; margin: 40px auto; padding: 20px; background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-radius: 8px; text-align: center; }
        .profile-frame { width: 200px; height: 200px; margin: 20px auto; border: 4px solid #24292e; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 8px rgba(0,0,0,0.15); }
        .profile-frame img { width: 100%; height: 100%; object-fit: cover; }
        .video-container { position: relative; padding-bottom: 56.25%; padding-top: 30px; height: 0; overflow: hidden; margin-top: 20px; border-radius: 6px; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-container">
            <a href="/" class="nav-logo">
                <img src="materials/picture/favorite_icon/favicon2.png" alt="Logo">
            </a>
            <div class="nav-links">
                <a href="/">Dashboard</a>
                <a href="personal/">Personal</a>
                <a href="blog/">Blog</a>
                <a href="background/">Background</a>
                <a href="contact/">Contact</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="profile-frame">
            <img src="materials/picture/portrait/photo.png" alt="Portrait">
        </div>
        <h1>Welcome to My Dashboard</h1>
        <p>Explore my personal space, read my latest blog posts, or get in touch.</p>
        <hr style="border: 0; border-top: 1px solid #eee; margin: 30px 0;">
        <h3>Featured Video</h3>
        <div class="video-container">
            <iframe src="https://www.youtube.com/embed/-8sM6MQtR4U?start=690" title="YouTube video player" allowfullscreen></iframe>
        </div>
    </div>

</body>
</html>
