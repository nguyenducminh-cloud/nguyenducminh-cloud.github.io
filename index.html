<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | My Portfolio</title>
    
    <!-- Code thêm Favicon (Icon trên thanh tab) -->
    <link rel="icon" type="image/png" href="materials/picture/favorite_icon/favicon.png">
    
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 0; 
            background-color: #f8f9fa; 
            color: #333; 
        }
        nav { 
            background-color: #24292e; 
            padding: 15px; 
            text-align: center; 
        }
        nav a { 
            color: white; 
            text-decoration: none; 
            margin: 0 15px; 
            font-weight: bold; 
        }
        nav a:hover { 
            color: #00bcd4; 
        }
        .container { 
            max-width: 800px; 
            margin: 40px auto; 
            padding: 20px; 
            background: white; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            border-radius: 8px; 
            text-align: center; 
        }
        
        /* Khung ảnh chân dung vuông */
        .profile-frame {
            width: 200px;
            height: 200px;
            margin: 20px auto;
            border: 4px solid #24292e;
            border-radius: 12px; /* Bo góc nhẹ cho hiện đại, nếu muốn vuông đét thì đổi thành 0 */
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
        }
        .profile-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Giúp ảnh tự động vừa vặn khung vuông, không bị méo hay giãn mặt */
        }

        /* Khung video YouTube tỉ lệ 16:9 chuẩn */
        .video-container { 
            position: relative; 
            padding-bottom: 56.25%; 
            padding-top: 30px; 
            height: 0; 
            overflow: hidden; 
            margin-top: 20px; 
            border-radius: 6px; 
        }
        .video-container iframe { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            border: 0; 
        }
    </style>
</head>
<body>

    <!-- Thanh menu điều hướng đến các thư mục con viết thường -->
    <nav>
        <a href="index.html">Dashboard</a>
        <a href="personal/index.html">Personal</a>
        <a href="blog/index.html">Blog</a>
        <a href="contact/index.html">Contact</a>
    </nav>

    <div class="container">
        <!-- Khung ảnh chân dung lấy từ đúng folder materials -->
        <div class="profile-frame">
            <img src="materials/picture/portrait/photo.png" alt="Portrait">
        </div>

        <h1>Welcome to My Dashboard</h1>
        <p>Explore my personal space, read my latest blog posts, or get in touch.</p>
        
        <hr style="border: 0; border-top: 1px solid #eee; margin: 30px 0;">

        <h3>Featured Video</h3>
        <div class="video-container">
            <iframe 
                src="https://www.youtube.com/embed/-8sM6MQtR4U?start=690" 
                title="YouTube video player" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                allowfullscreen>
            </iframe>
        </div>
    </div>

</body>
</html>
