<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal | Portfolio</title>
    <link rel="icon" type="image/png" href="../materials/picture/favorite_icon/favicon2.png">
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 0; 
            background-color: #f8f9fa; 
            color: #333; 
        }
        
        /* --- THANH NAV GOM GIỮA CÓ NỀN GIF ĐỘNG --- */
        nav { 
            /* 1. Thiết lập chuỗi màu loang gọn gàng: Đỏ -> Trắng -> Xanh dương -> quay lại Đỏ */
            background: linear-gradient(-45deg, #ff3333, #ffffff, #2b6cb0, #ff3333);
            
            /* Giữ nguyên các thông số cấu hình mượt mà vô tận và kích thước to rộng */
            background-size: 300% 300%; /* Thu nhỏ tỉ lệ một xíu vì chỉ còn 3 màu để chuyển động mượt hơn */
            animation: gradientMove 10s linear infinite; /* Giảm xuống 10 giây để nhịp chuyển màu Đỏ-Trắng-Xanh trông vừa mắt */
            
            padding: 24px 0; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            display: flex;
            justify-content: center;
        }

        .nav-container {
            width: 100%;
            max-width: 840px;
            display: flex;
            
            /* 3. Gom cả Logo và cụm Menu xích lại sát nhau ở CHÍNH GIỮA HEADER */
            justify-content: center; 
            
            align-items: center;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            text-decoration: none;
            margin-right: 30px; /* Tăng khoảng cách nhẹ giữa logo và chữ cho thoáng */
        }

        .nav-logo img {
            /* Tăng kích thước logo lên một chút (từ 35px lên 42px) để cân xứng với header to */
            width: 42px !important;
            height: 42px !important;
            object-fit: contain;
            border-radius: 8px; 
        }

        .nav-links {
            display: flex;
        }

        .nav-links a { 
            color: #1a202c; 
            text-decoration: none; 
            margin-left: 20px; 
            margin-right: 15px;
            font-weight: bold; 
            font-size: 1.05rem; /* Tăng cỡ chữ menu lên một xíu cho dễ đọc */
            text-shadow: 0 1px 1px rgba(255,255,255,0.8);
            transition: color 0.2s ease;
        }

        .nav-links a:hover { 
            color: #dd6b20; 
        }

        /* --- KHUNG NỘI DUNG TRANG PERSONAL --- */
        .content { 
            max-width: 800px; 
            margin: 40px auto; 
            padding: 20px; 
            background: white; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            border-radius: 8px; 
        }
        .page-title {
            text-align: center;
            color: #24292e;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-container">
            <a href="../" class="nav-logo">
                <img src="../materials/picture/favorite_icon/favicon2.png" alt="Logo">
            </a>
            <div class="nav-links">
                <a href="../">Dashboard</a>
                <a href="../personal/">Personal</a>
                <a href="../blog/">Blog</a>
                <a href="../background/">Background</a>
                <a href="../contact/">Contact</a>
            </div>
        </div>
    </nav>

    <div class="content">
        <h1 class="page-title">Personal Space</h1>
        <p style="text-align: center; color: #666;">This is my personal corner where I share my hobbies, music, and off-duty activities.</p>
    </div>

</body>
</html>
